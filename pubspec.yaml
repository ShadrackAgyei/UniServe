name: uniserve
description: "UniServe - A Smart Student Service App for campus services"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  provider: ^6.1.2
  # Routing
  go_router: ^14.8.1
  # Camera
  image_picker: ^1.1.2
  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # GPS
  geolocator: ^13.0.2
  # Phone calls & URLs
  url_launcher: ^6.3.1
  # Notifications
  flutter_local_notifications: ^18.0.1
  # HTTP for weather API
  http: ^1.2.2
  # Supabase backend
  supabase_flutter: ^2.9.0
  # Local database
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  # Local storage
  shared_preferences: ^2.3.4
  # Date formatting
  intl: ^0.19.0
  # Permissions
  permission_handler: ^11.3.1
  # Speech recognition
  speech_to_text: ^7.0.0
  # Connectivity
  connectivity_plus: ^6.0.0
  # QR scanning + generation
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  # Timezone support for scheduled notifications
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: "assets/images/uniserve_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/uniserve_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
